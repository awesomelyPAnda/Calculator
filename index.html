<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Calculator</title>
    <link rel="stylesheet" href="styles.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Neuton:ital,wght@0,200;0,300;0,400;0,700;0,800;1,400&display=swap" rel="stylesheet">
</head>
<body>
    <main>
        <div class="calculator">
            <div class="display top">
                <p id="top-text"></p>
            </div>
            <div class="display bottom">
                <p id="bottom-text"></p>
            </div>
            <div class="button-container">
                <div class="column">
                    <div class="square">
                        <div class="row first">
                            <button type="button" class="btn misc AC">AC</button>
                            <button type="button" class="btn misc backspace">&#9003;</button>
                            <button type="button" class="btn operator divide" data-value="/">&divide;</button>
                        </div>
                        <div class="row second">
                            <button type="button" class="btn number seven" data-value="7">7</button>
                            <button type="button" class="btn number eight" data-value="8">8</button>
                            <button type="button" class="btn number nine" data-value="9">9</button>
                        </div>
                        <div class="row third">
                            <button type="button" class="btn number four" data-value="4">4</button>
                            <button type="button" class="btn number five" data-value="5">5</button>
                            <button type="button" class="btn number six" data-value="6">6</button>
                        </div>
                        <div class="row fourth">
                            <button type="button" class="btn number one" data-value="1">1</button>
                            <button type="button" class="btn number two" data-value="2">2</button>
                            <button type="button" class="btn number three" data-value="3">3</button>
                        </div>
                        <div class="row bottom">
                            <button type="button" class="btn number zero" data-value="0">0</button>
                            <button type="button" class="btn decimal" data-value=".">.</button>
                        </div>
                    </div>
                </div>
            
                <div class="right">
                    <button class="btn operator multiply" data-value="*">&times;</button>
                    <button class="btn operator subtract" data-value="-">-</button>
                    <button class="btn operator add" data-value="+">+</button>
                    <button class="btn equals">=</button>
                </div>
            </div>
        </div>
    </main>
    <footer>
        <div class="footer">
            <p class="text copyright">Copyright © awesomelyPAnda</p>
            <a href="https://github.com/awesomelyPAnda"><img src="assets/fa.svg" id="favicon"></a>
        </div>
    </footer>
</body>
<script src="scripts/buttons.js" defer></script>
<script src="scripts/logic.js" defer></script>
</html>
