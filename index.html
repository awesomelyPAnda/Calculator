<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Calculator</title>
    <link rel="stylesheet" href="styles.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Neuton:ital,wght@0,200;0,300;0,400;0,700;0,800;1,400&display=swap" rel="stylesheet">
</head>
<body>
    <div class="calculator">
        <div class="display top">

        </div>
        <div class="display bottom">

        </div>
        <div class="button-container">
            <div class="column">
                <div class="square">
                    <div class="row first">
                        <button type="button" class="btn AC">AC</button>
                        <button type="button" class="btn backspace">&#9003;</button>
                        <button type="button" class="btn divide">&divide;</button>
                    </div>
                    <div class="row second">
                        <button type="button" class="btn seven">7</button>
                        <button type="button" class="btn eight">8</button>
                        <button type="button" class="btn nine">9</button>
                    </div>
                    <div class="row third">
                        <button type="button" class="btn four">4</button>
                        <button type="button" class="btn five">5</button>
                        <button type="button" class="btn six">6</button>
                    </div>
                    <div class="row fourth">
                        <button type="button" class="btn one">1</button>
                        <button type="button" class="btn two">2</button>
                        <button type="button" class="btn three">3</button>
                    </div>
                    <div class="row bottom">
                        <button type="button" class="btn zero">0</button>
                        <button type="button" class="btn decimal">.</button>
                    </div>
                </div>
            </div>
            
            <div class="right">
                <button class="btn multiply">&times;</button>
                <button class="btn subtract">-</button>
                <button class="btn add">+</button>
                <button class="btn equals">=</button>
            </div>
        </div>
    </div>
</body>
</html>
